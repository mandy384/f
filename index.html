<script>
  let layout = [25, 25, 14];
  let seatNumber = 1;
  let seatsDiv = document.getElementById("seats");

  let savedSeats = JSON.parse(localStorage.getItem("seats")) || {};

  layout.forEach(row => {
    let rowDiv = document.createElement("div");

    for (let i = 0; i < row; i++) {
      let seat = document.createElement("div");
      seat.classList.add("seat");

      let currentSeat = seatNumber;

      if (savedSeats[currentSeat] === "occupied") {
        seat.classList.add("occupied");
      } else {
        seat.classList.add("empty");
      }

      seat.innerText = currentSeat;

      seat.onclick = function() {
        if (seat.classList.contains("occupied")) {
          seat.classList.remove("occupied");
          seat.classList.add("empty");
          savedSeats[currentSeat] = "empty";
        } else {
          seat.classList.remove("empty");
          seat.classList.add("occupied");
          savedSeats[currentSeat] = "occupied";
        }

        localStorage.setItem("seats", JSON.stringify(savedSeats));
      };

      rowDiv.appendChild(seat);
      seatNumber++;
    }

    seatsDiv.appendChild(rowDiv);
  });
</script>
